    .swiper-slide {
      display: flex; align-items: center;
      justify-content: center; overflow: hidden;

    .slide-white{ background: #ffffff; }
    .slide-black{ background: #000000; }

    svg.main { width: 100%; height: 100vh; display: block; }

    .swiper-button-next, .swiper-button-prev {
      --swiper-navigation-size: 16px;
      color: rgba(0,0,0,0.3); transition: color .2s;
    }
    .dark-nav .swiper-button-next,
    .dark-nav .swiper-button-prev { color: rgba(255,255,255,0.3); }
    .swiper-pagination-bullet { background: rgba(0,0,0,0.3); }
    .swiper-pagination-bullet-active { background: #000; }
    .dark-nav .swiper-pagination-bullet { background: rgba(255,255,255,0.3); }
    .dark-nav .swiper-pagination-bullet-active { background: #fff; }

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  gsap.registerPlugin(MotionPathPlugin);

  /* ── SWIPER ── */
  var swiperEl = document.querySelector(".mySwiper");
  new Swiper(".mySwiper", {
    navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
    pagination:  { el: ".swiper-pagination", clickable: true },
    effect: "fade", fadeEffect: { crossFade: true }, speed: 600,
    on: { slideChange: function() { swiperEl.classList.toggle("dark-nav", this.activeIndex === 2); } }
  });

  /* ══════════════════════════════════
     SLIDE 1 — MÉTRONOME
  ═══════════════════════════════════ */
  gsap.set("#metro-needle", { rotation: -107, svgOrigin: "615 494" });
  gsap.to("#metro-needle", { rotation: 35, svgOrigin: "615 494", duration: 1.0, repeat: -1, yoyo: true, ease: "power2.inOut" });

  /* ══════════════════════════════════
     SLIDE 3 — ÉTOILE
  ═══════════════════════════════════ */
  gsap.to("#star4", {
    duration: 3.5, repeat: -1, yoyo: true, ease: "sine.inOut",
    motionPath: {
      path: "#horizMotionPath", align: "#horizMotionPath",
      alignOrigin: [0.5, 0.5], autoRotate: false, start: 0, end: 1
    }
  });

</script>
